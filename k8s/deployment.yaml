# Todo API + bundled frontend. SQLite (ephemeral) — no DATABASE_URL is set, so
# main.py falls back to sqlite:///./todos.db inside the container. Data is lost
# on pod restart, which is fine for this demo app.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo
  namespace: todo
  labels:
    app: todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        app: todo
    spec:
      containers:
        - name: todo
          # Pinned to the commit SHA built and pushed from the repo root context.
          image: ghcr.io/ludsil/todo:1621bf6
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
